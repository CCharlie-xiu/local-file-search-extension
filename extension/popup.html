<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Text Search</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="header">
      <h1 class="title">Local Text Search</h1>
      <button id="settingsBtn" class="icon-btn" title="Settings">&#9881;</button>
    </div>

    <!-- Search Bar -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Enter text to search in local files..." />
      <button id="searchBtn" class="btn primary">Search</button>
    </div>

    <!-- Status -->
    <div id="status" class="status hidden"></div>

    <!-- Results -->
    <div id="results" class="results hidden">
      <div class="results-header">
        <span id="resultCount"></span>
        <span id="resultTime" class="time"></span>
      </div>
      <div id="resultList" class="result-list"></div>
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">&#128269;</div>
      <p>Select text on any page, right-click, and choose<br><strong>"Search local files for..."</strong></p>
      <p class="hint">Or type a query above and click Search.</p>
    </div>

    <!-- No config warning -->
    <div id="noConfig" class="empty-state hidden">
      <div class="empty-icon">&#9888;</div>
      <p>No search directories configured.</p>
      <button id="openSettingsBtn" class="btn">Open Settings</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
